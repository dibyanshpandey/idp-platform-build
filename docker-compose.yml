version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=postgres://idp_user:password@db:5432/idp_db
    depends_on:
      - db

  fraud-service:
    build: ./fraud-service
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000

  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=idp_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=idp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
